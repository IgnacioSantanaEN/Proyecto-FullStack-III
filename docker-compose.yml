services:
  db: # Servicio de base de datos MySQL
    image: mysql:latest
    container_name: db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=bd
    ports:
      - "3306:3306"
    volumes:
      - db_data_nuevo:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin: # Servicio de phpMyAdmin para gestionar la base de datos
    image: phpmyadmin:latest
    container_name: phpmyadmin-1
    environment:
      - PMA_ARBITRARY=1
      #PMA_HOST: db
      #PMA_USER: root
      #PMA_PASSWORD: root
    ports:
      - "8085:80"
    restart: unless-stopped
    depends_on:
      - db

  usuario: # Servicio de microservicio de usuario
    build: ./backend/usuario
    image: proyecto-usuario:local
    ports:
      - "8082:8082"
    container_name: ms-usuario
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/bd
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: unless-stopped
    depends_on:
      - db

  producto: # Servicio de microservicio de producto
    build: ./backend/producto
    image: proyecto-producto:local
    ports:
      - "8083:8083"
    container_name: ms-producto
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/bd
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: unless-stopped
    depends_on:
      - db


  pedido: # Servicio de microservicio de pedido
    build: ./backend/pedido
    image: proyecto-pedido:local
    ports:
      - "8084:8084"
    container_name: ms-pedido
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/bd
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: unless-stopped
    depends_on:
      - db

  bff: # Backend-for-frontend
    build: ./backend/bff
    image: proyecto-bff:local
    ports:
      - "8086:8086"
    container_name: ms-bff
    environment:
      - MICROSERVICIO_USUARIO_URL=http://ms-usuario:8082
      - MICROSERVICIO_PEDIDO_URL=http://ms-pedido:8084
      - MICROSERVICIO_PRODUCTO_URL=http://ms-producto:8083
    restart: unless-stopped
    depends_on:
      - db
      - usuario
      - pedido
      - producto

volumes:
  db_data_nuevo:
